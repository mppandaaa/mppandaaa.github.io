


<!DOCTYPE html>
<html>
<head>
    <title>Soam - Register</title>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="icon" href="img/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="css/login.css">
    <script src="https://kit.fontawesome.com/a81368914c.js"></script>
</head>
<body>

    
        <div class="container">
            <div class="hero">
                <div class="hero-text-box">
                    <h1 class="heading-primary">We are here <br>to help farmers</h1>
                    <div class="hero-description">
                        <p>We stand by the farmer with the billions of liras we spend on agriculture every year</p>
                    </div>
                </div>
            </div>

            <div class="login-container">
                <form action="#" method="POST">

                    <div class="company">
                        <div class="logo">
                            <a href="index.html"><img src="img/logo.png"></a>
                        </div>
                        <div class="company-name">
                            <h3>SOAM PHIL-INTL. <br>marketing corporation</h3>
                        </div>
                    </div>
                        
                        <h2>Register</h2>
                        
                        <div class="input-div one">
                            <div class="i">
                                <i class="fas fa-user"></i>
                            </div>
                            <div>
                                <h5>Enter your name</h5>
                                <input class="input" type="text" name="name">
                            </div>
                        </div>
                        <div class="input-div two">
                            <div class="i">
                                <i class="fas fa-user"></i>
                            </div>
                            <div>
                                <h5>Enter your e-mail</h5>
                                <input class="input" type="email" name="email">
                            </div>
                        </div>
                        <div class="input-div two">
                            <div class="i">
                                <i class="fas fa-lock"></i>
                            </div>
                            <div>
                                <h5>Enter your password</h5>
                                <input class="input" type="password" name="password">
                            </div>
                        </div>
                        <div class="input-div two">
                            <div class="i">
                                <i class="fas fa-lock"></i>
                            </div>
                            <div>
                                <h5>Confirm your password</h5>
                                <input class="input" type="password" name="cpassword">
                            </div>
                        </div>
                        
                        <input type="submit" class="btn" name="submit" value="register now">


                        <a href="login.html">Already have an account?</a>
                        
                    </form>

                </div>
            
        </div>

   
    <script type="text/javascript" src="js/login.js"></script>

</body>


</html>
